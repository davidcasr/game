<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>David Castro • Software Engineer</title>
    <meta
      name="description"
      content="David Castro's interactive 2D portfolio. Explore my virtual office and discover my work, projects and background."
    />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="David Castro • Software Engineer" />
    <meta
      property="og:description"
      content="Explore my interactive 2D office and discover my work, projects and background."
    />
    <meta property="og:url" content="https://davidcasr.com/game/" />
    <meta
      property="og:image"
      content="https://davidcasr.com/game/android-chrome-512x512.png"
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="David Castro • Software Engineer" />
    <meta
      name="twitter:description"
      content="Explore my interactive 2D office and discover my work, projects and background."
    />
    <meta
      name="twitter:image"
      content="https://davidcasr.com/game/android-chrome-512x512.png"
    />
  </head>
  <body>
    <style>
      @font-face {
        font-family: monogram;
        src: url(monogram.ttf);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        /* Stop mobile pull-to-refresh and the rubber-band bounce while playing */
        overscroll-behavior: none;
      }

      body {
        font-family: monogram, monospace;
        font-size: 2rem;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #textbox {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 8vh;
        min-height: 10vh;
        background: white;
        border-radius: 3px;
        outline-style: solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
        /* overflow: auto; */
      }

      .ui-text {
        margin: 0;
        user-select: none;
      }

      .ui-close-btn {
        font-family: monogram, monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
      }

      .btn-container {
        align-self: flex-end;
        margin-top: 1rem;
      }

      .note {
        position: absolute;
        left: 5%;
        right: 5%;
        top: 1vh;
        display: flex;
        flex-direction: column;
        color: rgb(238, 238, 238);
        /* Scale down on narrow screens so the intro text doesn't overflow */
        font-size: clamp(0.9rem, 3.6vw, 2rem);
      }

      footer {
        position: absolute;
        bottom: 0;
        width: 100%;
        background-color: #311047;
        color: white;
        padding: 20px 0;
        text-align: center;
        font-size: 1.5rem;
      }

      footer a {
        color: white;
        text-decoration: none;
      }

      /* On-screen movement controls (shown on touch / coarse-pointer devices) */
      #touch-controls {
        display: none;
      }

      @media (pointer: coarse) {
        #touch-controls {
          display: grid;
          grid-template-columns: repeat(3, 3.2rem);
          grid-template-rows: repeat(3, 3.2rem);
          gap: 0.35rem;
          position: absolute;
          right: 6%;
          bottom: 90px;
          z-index: 20;
          user-select: none;
          touch-action: none;
        }
      }

      .dpad-btn {
        font-family: monogram, monospace;
        font-size: 1.6rem;
        color: white;
        background: rgba(49, 16, 71, 0.7);
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-radius: 10px;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
      }

      .dpad-btn:active {
        background: rgba(49, 16, 71, 0.95);
      }

      #btn-up { grid-column: 2; grid-row: 1; }
      #btn-left { grid-column: 1; grid-row: 2; }
      #btn-right { grid-column: 3; grid-row: 2; }
      #btn-down { grid-column: 2; grid-row: 3; }

      /* Loading screen shown until the game assets are ready */
      #loading {
        position: absolute;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #311047;
        color: white;
        font-family: monogram, monospace;
        font-size: 2rem;
        transition: opacity 0.4s ease;
      }

      #loading.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <div id="app">
      <div id="loading">Loading…</div>
      <div>
        <p class="note">
          Hi! I'm David and this is my office. I invite you to explore it and discover all my work information and other secrets... <br />
          Tap/Click around to move
        </p>

        <div id="textbox-container" style="display: none">
          <div id="textbox">
            <p id="dialogue" class="ui-text"></p>
            <div class="btn-container">
              <button id="close" class="ui-close-btn">Close</button>
            </div>
          </div>
        </div>
      </div>
      <canvas id="game"></canvas>
      <div id="touch-controls" aria-label="Movement controls">
        <button class="dpad-btn" id="btn-up" aria-label="Move up">▲</button>
        <button class="dpad-btn" id="btn-left" aria-label="Move left">◀</button>
        <button class="dpad-btn" id="btn-right" aria-label="Move right">▶</button>
        <button class="dpad-btn" id="btn-down" aria-label="Move down">▼</button>
      </div>
      <footer>
        Made with ❤️ by <a href="https://davidcasr.com/">@davidcasr</a>
      </footer>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
